name: Deploy Dev

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 배포할 브랜치 또는 커밋 SHA
        required: true
        default: main
      create_tag:
        description: 배포 성공 후 git 태그 생성 여부
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy To Dev Server
    runs-on: ubuntu-latest
    environment: dev
    env:
      DEV_SERVER_HOST: ${{ vars.DEV_SERVER_HOST }}
      DEV_SERVER_USER: ${{ vars.DEV_SERVER_USER }}
      DEV_SERVER_LOG_DIR: ${{ vars.DEV_SERVER_LOG_DIR }}
      DEV_SERVER_APP_DIR: ${{ vars.DEV_SERVER_APP_DIR }}
      DEV_SERVER_OBSERVABILITY_DIR: ${{ vars.DEV_SERVER_OBSERVABILITY_DIR }}
      DEV_SERVER_OBSERVABILITY_SCP_DIR: ${{ vars.DEV_SERVER_OBSERVABILITY_SCP_DIR }}
      DEV_SERVER_ENV_FILE: ${{ vars.DEV_SERVER_ENV_FILE }}
      DEV_SERVER_DOCKER_COMPOSE_CMD: ${{ vars.DEV_SERVER_DOCKER_COMPOSE_CMD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend assets
        run: npm run build --prefix frontend

      - name: Replace static assets
        run: |
          rm -rf ./abms-api-boot/src/main/resources/static/*
          mkdir -p ./abms-api-boot/src/main/resources/static
          cp -r ./frontend/dist/* ./abms-api-boot/src/main/resources/static/

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build backend artifacts
        run: ./gradlew clean build

      - name: Normalize jar names
        run: |
          mv ./abms-api-boot/build/libs/*.jar ./abms-api-boot/build/libs/abms-api.jar
          mv ./abms-batch-boot/build/libs/*.jar ./abms-batch-boot/build/libs/abms-batch.jar

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_SERVER_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${DEV_SERVER_HOST}" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        run: |
          set -euo pipefail

          SERVER_USER="${DEV_SERVER_USER:-ubuntu}"
          REMOTE_OBSERVABILITY_DIR="${DEV_SERVER_OBSERVABILITY_DIR:-\$HOME/ops}"
          REMOTE_OBSERVABILITY_SCP_DIR="${DEV_SERVER_OBSERVABILITY_SCP_DIR:-~/ops}"

          scp ./abms-api-boot/build/libs/abms-api.jar "${SERVER_USER}@${DEV_SERVER_HOST}:~/"
          scp ./abms-batch-boot/build/libs/abms-batch.jar "${SERVER_USER}@${DEV_SERVER_HOST}:~/"
          ssh "${SERVER_USER}@${DEV_SERVER_HOST}" "mkdir -p ${REMOTE_OBSERVABILITY_DIR}"
          scp -r ./ops/observability "${SERVER_USER}@${DEV_SERVER_HOST}:${REMOTE_OBSERVABILITY_SCP_DIR}/"

      - name: Restart app and observability stack
        run: |
          set -euo pipefail

          SERVER_USER="${DEV_SERVER_USER:-ubuntu}"
          LOG_DIR="${DEV_SERVER_LOG_DIR:-\$HOME/logs/abms}"
          REMOTE_APP_DIR="${DEV_SERVER_APP_DIR:-\$HOME}"
          REMOTE_OBSERVABILITY_DIR="${DEV_SERVER_OBSERVABILITY_DIR:-\$HOME/ops}"
          ENV_FILE="${DEV_SERVER_ENV_FILE:-\$HOME/.env}"
          DOCKER_COMPOSE_CMD="${DEV_SERVER_DOCKER_COMPOSE_CMD:-sudo docker compose}"

          ssh "${SERVER_USER}@${DEV_SERVER_HOST}" <<EOF
          set -euo pipefail
          LOG_DIR="${LOG_DIR}"
          REMOTE_APP_DIR="${REMOTE_APP_DIR}"
          REMOTE_OBSERVABILITY_DIR="${REMOTE_OBSERVABILITY_DIR}"
          ENV_FILE="${ENV_FILE}"
          DOCKER_COMPOSE_CMD="${DOCKER_COMPOSE_CMD}"

          stop_api() {
            PID_FILE="\$LOG_DIR/abms-api.pid"

            if [ -f "\$PID_FILE" ]; then
              PID=\$(cat "\$PID_FILE")
              if [ -n "\$PID" ] && kill -0 "\$PID" 2>/dev/null; then
                kill "\$PID" || true
                for _ in \$(seq 1 10); do
                  if ! kill -0 "\$PID" 2>/dev/null; then
                    rm -f "\$PID_FILE"
                    return 0
                  fi
                  sleep 1
                done
                kill -9 "\$PID" || true
                rm -f "\$PID_FILE"
                return 0
              fi
              rm -f "\$PID_FILE"
            fi

            pkill -f "java -jar abms-api.jar" || true
            for _ in \$(seq 1 10); do
              if ! pgrep -f "java -jar abms-api.jar" > /dev/null; then
                return 0
              fi
              sleep 1
            done

            pkill -9 -f "java -jar abms-api.jar" || true
          }

          mkdir -p "\$LOG_DIR"
          stop_api
          set -a
          source "\$ENV_FILE"
          set +a

          cd "\$REMOTE_APP_DIR"
          nohup env APP_ENVIRONMENT=dev APP_LOG_FILE_NAME="\$LOG_DIR/abms-api.log" java -jar abms-api.jar --spring.profiles.active=dev > /dev/null 2>&1 &
          echo \$! > "\$LOG_DIR/abms-api.pid"

          for i in \$(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/actuator/health > /dev/null; then
              break
            fi
            if [ "\$i" -eq 30 ]; then
              echo "Application health check failed" >&2
              exit 1
            fi
            sleep 2
          done

          cd "\$REMOTE_OBSERVABILITY_DIR/observability"
          ABMS_LOG_DIR="\$LOG_DIR" \$DOCKER_COMPOSE_CMD up -d

          for i in \$(seq 1 30); do
            TARGETS=\$(curl -sf http://127.0.0.1:9090/api/v1/targets || true)
            if echo "\$TARGETS" | grep -q '"job":"abms-api"' && echo "\$TARGETS" | grep -q '"health":"up"'; then
              break
            fi
            if [ "\$i" -eq 30 ]; then
              echo "Prometheus target check failed" >&2
              exit 1
            fi
            sleep 2
          done
          EOF

      - name: Create deploy tag
        if: ${{ inputs.create_tag }}
        run: |
          set -euo pipefail

          TAG_NAME="deploy-dev-$(TZ=Asia/Seoul date +%Y%m%d-%H%M%S)-$(git rev-parse --short HEAD)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "개발 서버 배포: $TAG_NAME"
          git push origin "$TAG_NAME"
