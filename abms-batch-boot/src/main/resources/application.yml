spring:
  application:
    name: abms-batch
  profiles:
    default: local
    group:
      local-batch:
        - local
        - batch
  jpa:
    open-in-view: false
  threads:
    virtual:
      enabled: true
  ai:
    openai:
      chat:
        options:
          model: gpt-4o-mini
  batch:
    job:
      enabled: true
      name: revenueMonthlySummaryJob
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  auth:
    registration-mail:
      from: ${APP_AUTH_REGISTRATION_MAIL_FROM}
      subject: ${APP_AUTH_REGISTRATION_MAIL_SUBJECT}
      confirm-url: ${APP_AUTH_REGISTRATION_MAIL_CONFIRM_URL}
  observability:
    environment: ${APP_ENVIRONMENT:${spring.profiles.active:local}}
    log-file-name: ${APP_LOG_FILE_NAME:logs/abms-batch.log}

management:
  metrics:
    tags:
      service: ${spring.application.name}
      env: ${app.observability.environment}

info:
  app:
    name: ${spring.application.name}
    version: ${APP_VERSION:local}
    environment: ${app.observability.environment}
