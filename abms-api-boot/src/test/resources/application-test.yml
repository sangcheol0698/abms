spring:
  mail:
    host: localhost
    port: 1025
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  ai:
    openai:
      api-key: test-api-key
      chat:
        options:
          model: gpt-4o-mini
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: never

app:
  auth:
    registration-mail:
      from: no-reply@iabacus.co.kr
      subject: "[ABMS] 회원가입 링크 안내"
      confirm-url: http://localhost:5173/auths/registration-confirm
    password-reset-mail:
      from: no-reply@iabacus.co.kr
      subject: "[ABMS] 비밀번호 재설정 안내"
      confirm-url: http://localhost:5173/auths/password-reset-confirm
  observability:
    health:
      mail:
        enabled: false
      openai:
        enabled: false
